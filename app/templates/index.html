<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Проверка URL ссылки</title>
    <link rel="icon" type="image/svg+xml" href="/static/faviconka.svg">
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>
    <div class="wrapper">
      <div class="card">
        <h1>Проверка ссылки</h1>
        <p class="description">
          Введите URL адрес сайта для проверки на фишинг.
        </p>

        <form class="url-form" id="urlForm">
          <div class="input-group">
            <input
              type="text"
              id="urlInput"
              placeholder="https://example.com"
              required
            />
          </div>
          <button type="submit" class="btn-check" id="btnCheck">
            <span id="btnText">Проверить</span>
          </button>
        </form>

        <!-- Индикатор загрузки -->
        <div class="loader-container" id="loaderContainer">
          <div class="loader"></div>
          <span class="loader-text">Анализируем ссылку...</span>
        </div>

        <!-- Блок для вывода результата -->
        <div class="result-box" id="resultBox"></div>
        <div class="explanations" id="explanationsBox"></div>
      </div>
    </div>

    <script>
      document
        .getElementById("urlForm")
        .addEventListener("submit", async function (e) {
          e.preventDefault();

          const urlInput = document.getElementById("urlInput");
          const resultBox = document.getElementById("resultBox");
          const explanationsBox = document.getElementById("explanationsBox");
          const loaderContainer = document.getElementById("loaderContainer");
          const btnCheck = document.getElementById("btnCheck");
          const btnText = document.getElementById("btnText");
          const url = urlInput.value;

          // Показываем индикатор загрузки
          loaderContainer.style.display = "flex";
          resultBox.textContent = "";
          explanationsBox.innerHTML = "";

          // Блокируем кнопку
          btnCheck.disabled = true;
          btnText.textContent = "Проверка...";
          btnCheck.classList.add("disabled");

          try {
            const response = await fetch("/check", {
              method: "POST",
              headers: {
                "Content-Type": "application/json",
              },
              body: JSON.stringify({ url: url }),
            });

            const data = await response.json();

            if (data.error) {
              resultBox.textContent = "Ошибка: " + data.error;
              resultBox.className = "result-box error";
            } else {
              resultBox.textContent = data.verdict_text;
              resultBox.className = "result-box " + data.verdict;

              if (data.explanations && data.explanations.length > 0) {
                explanationsBox.innerHTML =
                  "<div class='expl-list'><ul>" +
                  data.explanations.map((exp) => `<li>${exp}</li>`).join("") +
                  "</ul></div>";
              }
            }
          } catch (error) {
            resultBox.textContent = "Ошибка соединения с сервером";
            resultBox.className = "result-box error";
          } finally {
            // Скрываем загрузку и разблокируем кнопку
            loaderContainer.style.display = "none";
            btnCheck.disabled = false;
            btnText.textContent = "Проверить";
            btnCheck.classList.remove("disabled");
          }
        });
    </script>
  </body>
</html>
